<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candor — Production · GST Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../shared/css/variables.css">
  <link rel="stylesheet" href="../../../shared/css/reset.css">
  <link rel="stylesheet" href="../../../shared/css/titlebar.css">
  <link rel="stylesheet" href="../../../shared/css/sidebar.css">
  <link rel="stylesheet" href="../../../shared/css/toast.css">
  <link rel="stylesheet" href="../../../shared/css/animations.css">
  <style>
    .coming-soon {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 60%; text-align: center;
      animation: fadeUp 0.4s ease both;
    }
    .coming-soon svg { width: 48px; height: 48px; color: var(--text-muted); opacity: 0.3; margin-bottom: 16px; }
    .coming-soon h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 6px; }
    .coming-soon p { font-size: 13px; color: var(--text-secondary); font-weight: 300; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <button class="back-arrow" id="backArrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        <span id="backLabel">Back</span>
      </button>
      <span class="back-arrow-sep" id="backSep"></span>
      <span class="titlebar-brand">Candor</span>
      <span class="titlebar-sep"></span>
      <div class="titlebar-crumbs">
        <span class="crumb-current">Production — GST Summary</span>
      </div>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-btn minimize"><svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg></button>
      <button class="titlebar-btn maximize"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><rect x="0.5" y="0.5" width="8" height="8" stroke="currentColor"/></svg></button>
      <button class="titlebar-btn close"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2"/></svg></button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section-label">Production</div>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          SO Intake
        </button>
        <button class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          GST Summary
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Work Orders
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">U</div>
          <div class="user-info"><div class="user-name">User</div><div class="user-email">user@gmail.com</div></div>
          <button class="logout-btn" id="logoutBtn" title="Sign out">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <div class="coming-soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <h2>GST Summary</h2>
        <p>This module is coming soon</p>
      </div>
    </main>
  </div>
  <div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>
  <script src="../../../shared/js/titlebar.js"></script>
  <script src="../../../shared/js/toast.js"></script>
  <script src="../../../shared/js/navigation.js"></script>
  <script>setupBackArrow(); setupLogout('logoutBtn');</script>
</body>
</html>
