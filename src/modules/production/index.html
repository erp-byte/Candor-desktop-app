<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candor — Production</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/css/variables.css">
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/titlebar.css">
  <link rel="stylesheet" href="../../shared/css/sidebar.css">
  <link rel="stylesheet" href="../../shared/css/toast.css">
  <link rel="stylesheet" href="../../shared/css/animations.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="production-page">

  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-left">
      <button class="back-arrow" id="backArrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        <span id="backLabel">Back</span>
      </button>
      <span class="back-arrow-sep" id="backSep"></span>
      <span class="titlebar-brand">Candor</span>
      <span class="titlebar-sep"></span>
      <span class="titlebar-page">Production</span>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-btn minimize"><svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg></button>
      <button class="titlebar-btn maximize"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><rect x="0.5" y="0.5" width="8" height="8" stroke="currentColor"/></svg></button>
      <button class="titlebar-btn close"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2"/></svg></button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section-label">Production</div>

        <button class="nav-item active" title="Production Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Overview
        </button>

        <div class="nav-section-label">Navigation</div>
        <button class="nav-item" id="navBackModules">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to Modules
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">U</div>
          <div class="user-info">
            <div class="user-name">User</div>
            <div class="user-email">user@gmail.com</div>
          </div>
          <button class="logout-btn" id="logoutBtn" title="Sign out">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header">
        <p class="page-greeting">Production Module</p>
        <h1 class="page-title">Production</h1>
      </div>

      <div class="submodule-grid" id="submoduleGrid"></div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

  <script src="../../shared/js/titlebar.js"></script>
  <script src="../../shared/js/toast.js"></script>
  <script src="../../shared/js/navigation.js"></script>
  <script src="production.js"></script>
</body>
</html>
