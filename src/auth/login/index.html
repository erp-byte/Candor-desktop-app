<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candor — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/css/variables.css">
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/titlebar.css">
  <link rel="stylesheet" href="../../shared/css/toast.css">
  <link rel="stylesheet" href="../../shared/css/animations.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Compact title bar (no brand, just window buttons) -->
  <div class="titlebar compact">
    <button class="titlebar-btn minimize">
      <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
    </button>
    <button class="titlebar-btn maximize">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><rect x="0.5" y="0.5" width="8" height="8" stroke="currentColor"/></svg>
    </button>
    <button class="titlebar-btn close">
      <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
  </div>

  <div class="container">
    <!-- Left brand panel -->
    <div class="brand-panel">
      <div class="v-lines"><span></span><span></span></div>
      <div class="brand-logo">
        <div class="brand-name">Candor</div>
        <div class="brand-tagline">Clarity in every detail</div>
      </div>
      <div class="brand-diamond"></div>
    </div>

    <!-- Right form panel -->
    <div class="form-panel">
      <div class="form-wrapper">
        <h1 class="form-heading">Welcome back</h1>
        <p class="form-subtitle">Sign in to continue to your workspace</p>

        <form id="loginForm" novalidate>
          <div class="input-group">
            <label class="input-label" for="email">Email</label>
            <div class="input-field-wrap">
              <input type="email" id="email" class="input-field" placeholder="you@example.com" autocomplete="email" spellcheck="false" required />
            </div>
          </div>

          <div class="input-group">
            <label class="input-label" for="password">Password</label>
            <div class="input-field-wrap">
              <input type="password" id="password" class="input-field password-field" placeholder="Enter your password" autocomplete="current-password" required />
              <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Show password">
                <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-options">
            <button type="button" class="forgot-btn" id="forgotBtn">Forgot password?</button>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="btn-content">
              <span class="spinner"></span>
              <span class="btn-text">Sign In</span>
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

  <!-- Forgot password modal -->
  <div class="modal-overlay" id="forgotModal">
    <div class="modal">
      <h2 class="modal-title">Reset password</h2>
      <p class="modal-desc">Enter your email address and we'll send you a link to reset your password.</p>
      <div class="input-group" style="margin-bottom:0">
        <label class="input-label" for="resetEmail">Email</label>
        <input type="email" id="resetEmail" class="input-field" placeholder="you@example.com" spellcheck="false" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="modalCancel">Cancel</button>
        <button class="modal-btn primary" id="modalSend">Send Link</button>
      </div>
    </div>
  </div>

  <!-- Welcome screen -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-check">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
        <polyline points="6 12 10 16 18 8"/>
      </svg>
    </div>
    <h1 class="welcome-title">Welcome to Candor</h1>
    <p class="welcome-sub">You're signed in successfully</p>
  </div>

  <script src="../../shared/js/titlebar.js"></script>
  <script src="../../shared/js/toast.js"></script>
  <script src="../../shared/js/navigation.js"></script>
  <script src="login.js"></script>
</body>
</html>
